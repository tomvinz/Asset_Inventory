services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: asset_inventory
      POSTGRES_USER: asset_inventory
      POSTGRES_PASSWORD: asset_inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql://asset_inventory:asset_inventory@postgres:5432/asset_inventory
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres-data:
