---
- name: Discover network assets
  hosts: localhost
  gather_facts: false
  vars:
    discovery_targets:
      - 127.0.0.1
    discovery_plugins:
      - nmap
      - dns
  tasks:
    - name: Run discovery plugins
      ansible.builtin.command:
        cmd: >
          python -m discovery.cli
          --targets {{ discovery_targets | join(',') }}
          --plugins {{ discovery_plugins | join(',') }}
      changed_when: false
